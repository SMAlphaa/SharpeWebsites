<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorpSolution | Contact Us</title>
    <meta name="description" content="Reach out to our team.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/business.css">
</head>

<body>

    <header>
        <div class="top-bar">
            <div class="container" style="display:flex; justify-content:space-between;">
                <span><i class="icon"></i> info@corpsolution.com</span>
                <span>Mon - Fri: 9:00 - 18:00</span>
            </div>
        </div>
        <div class="container nav-area">
            <div class="logo">CorpSolution.</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </header>

    <div class="hero"
        style="height: 300px; background-image: linear-gradient(rgba(27, 20, 100, 0.8), rgba(27, 20, 100, 0.8)), url('https://images.unsplash.com/photo-1557426272-fc759fdf7a8d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');">
        <div class="container">
            <h1>Contact Us</h1>
        </div>
    </div>

    <section style="padding: 5rem 0;">
        <div class="container">
            <div
                style="max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
                <form>
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Full Name</label>
                        <input type="text"
                            style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Email Address</label>
                        <input type="email"
                            style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Subject</label>
                        <input type="text"
                            style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Message</label>
                        <textarea rows="5"
                            style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px;"></textarea>
                    </div>
                    <button type="button" class="btn">Send Request</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="text-center">
                <p>&copy; 2026 CorpSolution Demo. All rights reserved.</p>
            </div>
        </div>
    </footer>

    
</body>

</html>
